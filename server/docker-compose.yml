version: "3.9"
volumes:
  pgdata: {}
services:
  db:
    image: "postgres:15"
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 1s
      timeout: 5s
      retries: 60
  server:
    depends_on:
      db:
        condition: service_healthy
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    restart: always
    environment:
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/evil?sslmode=disable"
      GOOGLE_EMAIL: "${GOOGLE_EMAIL}"
      GOOGLE_PASSWORD: "${GOOGLE_PASSWORD}"
