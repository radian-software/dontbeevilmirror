version: "3.9"
volumes:
  pgdata: {}
  b2mock: {}
services:
  db:
    image: "postgres:15"
    ports:
      - "5432:5432"
    restart: always
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 1s
      timeout: 5s
      retries: 60
  server:
    depends_on:
      db:
        condition: service_healthy
    build:
      context: ..
      dockerfile: server/Dockerfile
    ports:
      - "8080:8080"
    restart: always
    environment:
      DATABASE_URL: "postgres://postgres:${POSTGRES_PASSWORD}@db:5432/evil?sslmode=disable"
      GOOGLE_EMAIL: "${GOOGLE_EMAIL}"
      GOOGLE_PASSWORD: "${GOOGLE_PASSWORD}"
      B2_USE_MOCK: "${B2_USE_MOCK}"
      B2_KEY_ID: "${B2_KEY_ID}"
      B2_KEY_SECRET: "${B2_KEY_SECRET}"
      B2_BUCKET: "${B2_BUCKET}"
      B2_URL_BASE: "${B2_URL_BASE}"
      ENABLE_BACKGROUND_JOBS: "1"
    volumes:
      - b2mock:/src/server/.b2mock
